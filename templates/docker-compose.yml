services:
  db-phpunit:
    image: mysql:5.7
    environment:
      MYSQL_DATABASE: {{DB_NAME}}
      MYSQL_USER: {{DB_USER}}
      MYSQL_PASSWORD: {{DB_PASSWORD}}
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

  phpunit:
    image: pattonwebz/phpunit-wordpress:${PHPUNIT_IMAGE_TAG:-1.0.0}
    depends_on:
      - db-phpunit
    environment:
      WORDPRESS_DB_HOST: db-phpunit:3306
      WORDPRESS_DB_USER: {{DB_USER}}
      WORDPRESS_DB_PASSWORD: {{DB_PASSWORD}}
      WORDPRESS_DB_NAME: {{DB_NAME}}
    volumes:
      - ./:/var/www/html/wp-content/plugins/{{PLUGIN_SLUG}}
    working_dir: /var/www/html/wp-content/plugins/{{PLUGIN_SLUG}}
    entrypoint: ["/bin/bash"]
    tty: true

volumes:
  db_data:
